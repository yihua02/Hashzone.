<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hashzone.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">

<style>
body {
  background: white;
  color: black;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

header {
  width: 100%;
  padding: 30px 0;
  margin: 0 auto;
  text-align: center;
}

.headline {
  font-size: clamp(20px, 4vw, 32px);
}

#tx {
  position: absolute;
  left: 0;
  width: clamp(180px, 20vw, 300px);
  font-size: clamp(12px, 1.5vw, 20px);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

#grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: min(68vw, 400px);
  aspect-ratio: 1 / 1;
  gap: 5px;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px, 3vw, 34px);
  font-family: 'Inter';
  font-weight: 900;
}

#bottom {
  margin-top: 50px;
  width: min(90vw, 1000px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  text-align: center;
  font-size: clamp(16px, 2vw, 24px);
}

#timer {
  margin-top: 30px;
  font-size: clamp(16px, 2.5vw, 24px);
}

.hex-0, .hex-1, .hex-2, .hex-3, .hex-4,
.hex-5, .hex-6, .hex-7, .hex-8, .hex-9 {
  color: black;
}

.hex-A { color: blue; }
.hex-B { color: purple; }
.hex-C { color: red; }
.hex-D { color: orange; }
.hex-E { color: gold; }
.hex-F { color: green; }

#tx h3 {
  margin-top: 0;
}

footer {
  width: 100%;
  height: 0px; 
  text-align: center;
  padding: 50px 0;
  background-color: white;
}
.footer-text {
  color: black;
}

@keyframes glitchColor {
  0% {
    text-shadow: 2px 0 red, -2px 0 cyan;
    opacity: 1;
  }
  20% {
  opacity: 0;
  text-shadow: none;
  }
  40% {
    text-shadow: 2px 0 blue, -2px 0 yellow;
    opacity: 1;
  }
  60% {
    text-shadow: -2px 0 magenta, 2px 0 lime;
    opacity: 0.75;
  }
  80% {
    text-shadow: 1px 0 black, -1px 0 black;
    opacity: 0.9;
  }
  100% {
    text-shadow: 0 0 0 transparent;
    opacity: 1;
  }
}

.glitch {
  animation: glitchColor 0.25s ease;
}

#grid.glitch {
  filter: contrast(2) brightness(1.2);
}

</style>
</head>

<body>

<header>
  <h1 class="headline">Hashzone.</h1>
</header>

<div class="container">

  <div id="tx">
    <h3>Transactions</h3>
    <div id="txinfo">loading...</div>
  </div>

  <div class="main">

    <div id="grid"></div>

    <div id="bottom">
      <div id="height">-</div>
      <div id="miner">-</div>
      <div id="time">-</div>
    </div>

    <div id="timer">Elapsed: --</div>

  </div>

</div>

<audio id="noise" src="tv-noise.mp3"></audio>

<footer>
  	<p>Copyright © 2026 AsToRcHiCa Inc. All rights reserved.</p>
</footer>

<script>

let currentHash = ""
let blockTime = 0
let audioCtx = null

document.body.addEventListener("click", () => {
  const audio = document.getElementById("noise")
  audio.play().then(() => {
    audio.pause()
    audio.currentTime = 0
  }).catch(() => {})
}, { once: true })

async function loadBlock() {
  try {
    const hashRes = await fetch("https://mempool.space/api/blocks/tip/hash")
    const hash = (await hashRes.text()).trim()

    if (hash === currentHash) return
    currentHash = hash

    const blockRes = await fetch(`https://mempool.space/api/block/${hash}`)
    const block = await blockRes.json()

    renderGrid(hash)
    triggerGlitch()
    playNoise()

    blockTime = block.timestamp
    const date = new Date(block.timestamp * 1000)

    document.getElementById("height").textContent =
      "Height: " + block.height

    document.getElementById("miner").textContent =
      "Miner: " + (block.extras?.pool?.name || "Unknown")

    document.getElementById("time").textContent =
      "Timestamp: " + date.toLocaleString()

    const txRes = await fetch(`https://mempool.space/api/block/${hash}/txs`)
    const txs = await txRes.json()

    let totalFees = 0
    txs.forEach(tx => totalFees += tx.fee)

    totalFees = totalFees / 100000000

    const diff = block.difficulty.toExponential(2)
    const [base, exp] = diff.split("e+")

    const diffFormatted = `${base} × 10<sup>${exp}</sup>`

    document.getElementById("txinfo").innerHTML =
      "Total Fees: " + totalFees.toFixed(4) + " BTC<br><br>" +
      "Count: " + block.tx_count + "<br><br>" +
      "Size: " + block.size + "<br><br>" +
      "Difficulty: " + diffFormatted

  } catch (e) {
    console.log(e)
  }
}

function updateTimer() {
  if (!blockTime) return

  const now = Math.floor(Date.now() / 1000)
  const elapsed = now - blockTime

  const min = Math.floor(elapsed / 60)
  const sec = elapsed % 60

  document.getElementById("timer").textContent =
    "Elapsed: " +
    String(min).padStart(2, '0') + "m " +
    String(sec).padStart(2, '0') + "s"
}

function renderGrid(hash) {
  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  for (let i = 0; i < 64; i++) {
    const ch = hash[i].toUpperCase()

    const div = document.createElement("div")
    div.className = "cell hex-" + ch
    div.textContent = ch

    grid.appendChild(div)
  }
}

function triggerGlitch() {
  const cells = document.querySelectorAll(".cell")

  cells.forEach(cell => {
    if (Math.random() > 0.15) {
      cell.classList.add("glitch")
    }
  })

  setTimeout(() => {
    cells.forEach(cell => {
      cell.classList.remove("glitch")
    })
  }, 300)

  const grid = document.getElementById("grid")
  
  grid.classList.add("glitch")

  setTimeout(() => {
    grid.classList.remove("glitch")
  }, 200)
}

function playNoise() {
  const audio = document.getElementById("noise")
  audio.currentTime = 0
  audio.play()
}

loadBlock()
setInterval(loadBlock, 30000)
setInterval(updateTimer, 1000)

</script>

</body>
</html>
