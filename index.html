<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hashzone.</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

header {
  width: 100%;
  padding: 30px 0;
  margin: 0 auto;
  text-align: center;
}

header .headline{
  font-size: 32px;
}

.container {
  display: flex;
}

#tx {
  width: 0px;
  padding: 0px;
  color: white;
  font-size: 20px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

#grid {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 20px;
  margin: 0px;
}

.cell {
  text-align: center;
  font-size: 30px;
}

#bottom {
  margin-top: 50px;
  width: 1000px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  text-align: center;
  font-size: 24px;
}

#timer {
  margin-top: 30px;
  font-size: 24px;
  color: white;
}

.hex-0 { color: #666; }
.hex-1 { color: #ff4da6; }
.hex-2 { color: #b84dff; }
.hex-3 { color: #3399ff; }
.hex-4 { color: #33cc66; }
.hex-5 { color: #99ff33; }
.hex-6 { color: #ffcc00; }
.hex-7 { color: #ff9933; }
.hex-8 { color: #ff3333; }
.hex-9 { color: #ff66aa; }
.hex-A { color: #ff4da6; }
.hex-B { color: #b84dff; }
.hex-C { color: #3399ff; }
.hex-D { color: #33cc66; }
.hex-E { color: #99ff33; }
.hex-F { color: #ffcc00; }

#tx h3 {
  margin-top: 0;
}

footer {
  width: 100%;
  height: 0px; 
  text-align: center;
  padding: 50px 0;
  background-color: black;
}
.footer-text {
  color: white;
}

</style>
</head>

<body>

<header>
  <h1 class="headline">
    <a>Hashzone.</a>
  </h1>
</header>

<div class="container">

  <div id="tx">
    <h3>Transactions</h3>
    <div id="txinfo">loading...</div>
  </div>

  <div class="main">

    <div id="grid"></div>

    <div id="bottom">
      <div id="height">-</div>
      <div id="miner">-</div>
      <div id="time">-</div>
    </div>

    <div id="timer">Elapsed: --</div>

  </div>

</div>

<footer>
  	<p>Copyright © 2026 AsToRcHiCa Inc. All rights reserved.</p>
</footer>

<script>

let currentHash = ""
let blockTime = 0

async function loadBlock() {
  try {
    const hashRes = await fetch("https://mempool.space/api/blocks/tip/hash")
    const hash = (await hashRes.text()).trim()

    if (hash === currentHash) return
    currentHash = hash

    const blockRes = await fetch(`https://mempool.space/api/block/${hash}`)
    const block = await blockRes.json()

    renderGrid(hash)

    document.body.style.background = "#111"
    setTimeout(() => {
      document.body.style.background = "black"
    }, 150)

    blockTime = block.timestamp
    const date = new Date(block.timestamp * 1000)

    document.getElementById("height").textContent =
      "Block height: " + block.height

    document.getElementById("miner").textContent =
      "Miner: " + (block.extras?.pool?.name || "Unknown")

    document.getElementById("time").textContent =
      "Timestamp: " + date.toLocaleString()

    document.getElementById("txinfo").innerHTML =
      "Count: " + block.tx_count + "<br>" + "<br>" +
      "Size: " + block.size + "<br>" + "<br>" +
      "Weight: " + block.weight + "<br>" + "<br>" +
      "Version: " + block.version + "<br>" + "<br>" +
      "Bits: " + block.bits + "<br>" + "<br>" +
      "Difficulty: " + block.difficulty

  } catch (e) {
    console.log(e)
  }
}

function updateTimer() {
  if (!blockTime) return

  const now = Math.floor(Date.now() / 1000)
  const elapsed = now - blockTime

  const min = Math.floor(elapsed / 60)
  const sec = elapsed % 60

  document.getElementById("timer").textContent =
    "Elapsed: " +
    String(min).padStart(2, '0') + "m " +
    String(sec).padStart(2, '0') + "s"
}

function renderGrid(hash) {
  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  for (let i = 0; i < 64; i++) {
    const ch = hash[i].toUpperCase()

    const div = document.createElement("div")
    div.className = "cell hex-" + ch
    div.textContent = ch

    grid.appendChild(div)
  }
}

loadBlock()
setInterval(loadBlock, 30000)
setInterval(updateTimer, 1000)

</script>

</body>
</html>
